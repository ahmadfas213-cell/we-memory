<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;700&display=swap"

<body>

<div class="background">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

</div>

<section class="hero">

    <span>

        chapter two

    </span>

    <h1>

        Memory Box

    <p>

        Aku nemuin beberapa kenangan kecil.

        tapi buat aku... enggak.

    </p>

</section>

<section class="memoryGrid">

    <div class="photo"
         data-text="Masih inget ga? Hari itu kita ketawa cuma gara-gara hal receh.">

        <img src="../assets/images/foto1.jpg"
             alt="foto1">

    </div>

    <div class="photo"
         data-text="Aku selalu suka cara kamu cerita. Walaupun kadang panjang banget wkwkwk.">

        <img src="../assets/images/foto2.jpg"
             alt="foto2">

    </div>

    <div class="photo"
         data-text="Foto ini sederhana. Tapi tiap liat ini aku senyum sendiri.">

        <img src="../assets/images/foto3.jpg"
             alt="foto3">

    </div>

    <div class="photo"
         data-text="Semoga nanti kita bisa bikin foto-foto baru lagi.">

        <img src="../assets/images/foto4.jpg"

    </div>

    <div class="photo"
         data-text="Yang ini salah satu momen favorit aku. Kelihatannya biasa, tapi buat aku berarti banget.">

         data-text="Aku harap suatu hari nanti, galeri kita gak berhenti di enam foto ini aja.">

        <img src="../assets/images/foto6.jpg"
             alt="foto6">

    </div>

</section>

<div id="popup">

    <div class="popupCard">

        <img id="popupImage">

        <p id="popupText"></p>

        <button id="closePopup">

            Tutup

        </button>

    </div>

</div>

<section class="next">
